services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: minimal_taxi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: minimal_taxi_auth
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d minimal_taxi_auth"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: minimal_taxi_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  auth-service:
    build:
      context: ./backend/AuthService
      dockerfile: Dockerfile
    container_name: minimal_taxi_auth_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AuthDb: Host=postgres;Port=5432;Database=minimal_taxi_auth;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      ProfileSync__BaseUrl: http://minimal-taxi-service:8080
      ProfileSync__InternalKey: ${INTERNAL_API_KEY}
      Email__Host: ${EMAIL_HOST}
      Email__Port: ${EMAIL_PORT}
      Email__EnableSsl: ${EMAIL_ENABLE_SSL}
      Email__From: ${EMAIL_FROM}
      Email__FromName: ${EMAIL_FROM_NAME}
      Email__User: ${EMAIL_USER}
      Email__Pass: ${EMAIL_PASS}
    networks:
      - app-network

  minimal-taxi-service:
    build:
      context: ./backend/MinimalTaxiService
      dockerfile: Dockerfile
    container_name: minimal_taxi_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MinimalTaxiServiceDb: Host=postgres;Port=5432;Database=minimal_taxi_service_db;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      ConnectionStrings__Redis: redis:6379
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__SecretKey: ${JWT_SECRET_KEY}
      InternalApi__Key: ${INTERNAL_API_KEY}
      Yandex__ApiKey: ${YANDEX_API_KEY}
      Dadata__ApiKey: ${DADATA_API_KEY}
      Dadata__SecretKey: ${DADATA_SECRET_KEY}
      S3__Region: ${S3_REGION}
      S3__Endpoint: ${S3_ENDPOINT}
      S3__AccessKeyId: ${S3_ACCESS_KEY_ID}
      S3__SecretAccessKey: ${S3_SECRET_ACCESS_KEY}
      S3__BucketName: ${S3_BUCKET_NAME}
      S3__PublicBaseUrl: ${S3_PUBLIC_BASE_URL}
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minimal_taxi_frontend
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:1.27-alpine
    container_name: minimal_taxi_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - auth-service
      - minimal-taxi-service
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/conf.d/minimal-taxi.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
